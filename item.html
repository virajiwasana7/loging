<!DOCTYPE html>
<html>
<head>
<title>Item Page</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.item{
    background:white;
    padding:20px;
    width:150px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

button{
    padding:8px 12px;
    background:green;
    color:white;
    border:none;
    border-radius:4px;
}
</style>

</head>

<body>

<h1>My Items</h1>

<div class="container">

<div class="item">
<h3>Item 1</h3>
<p>Price: $10</p>
<button>Buy</button>
</div>

<div class="item">
<h3>Item 2</h3>
<p>Price: $15</p>
<button>Buy</button>
</div>

<div class="item">
<h3>Item 3</h3>
<p>Price: $20</p>
<button>Buy</button>
</div>

</div>

</body>
</html>
