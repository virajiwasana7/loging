<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:25px;
    border-radius:8px;
    width:250px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:8px;
    margin:8px 0;
}

button{
    width:100%;
    padding:8px;
    background:#007bff;
    color:white;
    border:none;
}
</style>

<script>
function login(){
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user == "admin" && pass == "1234"){
        alert("Login Success");
    }else{
        alert("Wrong Username or Password");
    }
}
</script>

</head>

<body>

<div class="login-box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</body>
</html>
